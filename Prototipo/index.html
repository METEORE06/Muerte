<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datos estudiantiles</title>
    <link rel="stylesheet" href="./css/Prototipo.css">
</head>
<body>
    
    <h1>Gestión de Estudiantes</h1>
    <h2>Facultad de Ciencias</h2>
  <form id="formEstudiante">
    <input type="text" id="nombre" placeholder="Nombre" required>
    <input type="date" id="fechaNacimiento" required>
    <input type="text" id="carrera" placeholder="Carrera" requiered>
    <input type="text" id="nacionalidad" placeholder="Nacionalidad" required>
    <button type="submit">Registrar</button>
  </form>

  <h2>Lista de Estudiantes</h2>
  <table id="tablaEstudiantes">
    <thead>
      <tr>
        <th>ID</th><th>Nombre</th><th>Fecha Nac.</th><th>Carrera</th><th>Nacionalidad</th><th>Acciones</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script src="../Prototipo/js/Prototipo.js"></script>
  
</body>
</html>
