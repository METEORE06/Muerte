<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>resgistro de direccion general</title>
    <link rel="stylesheet" href="registro.css">
</head>
<body>
     <div class="contenedor">

        <div class="card-registro">

            <h1>Facultad de Ciencias</h1>

            <p class="subtitulo">
                Registro de Usuario
            </p>

            <form>

                <div class="grupo">

                    <label>Nombre</label>

                    <input type="text" placeholder="Ingrese su nombre">
                </div>

                <div class="grupo">

                    <label>Apellidos</label>

                    <input type="text" placeholder="Ingrese sus apellidos">
                </div>

                <div class="acceso">

                    <div class="card">
                    <h2>Seleccionar un nivel de acceso</h2>
                    
                <select id="user-select" onchange="actualizarUsuarioActivo()">
                <option value="5">(Estudiante - Nivel 1)</option>
                <option value="4">(Profesor - Nivel 2)</option>
                <option value="3">(Secretaria - Nivel 3)</option>
                <option value="2">(Jefe departamento - Nivel 4)</option>
                <option value="1">(Decano / Vice decano - Nivel 5)</option>
                </select>
                    <div id="user-status" style="font-size: 13px; color: #475569; line-height: 1.4;"></div>
                </div>

                <div class="grupo">

                    <label>Usuario</label>

                    <input type="text" placeholder="Cree un nombre de usuario">
                </div>

                <div class="grupo">

                    <label>Contraseña</label>

                    <input type="password" placeholder="Ingrese una contraseña">
                </div>

                <div class="grupo">

                    <label>Confirmar Contraseña</label>

                    <input type="password" placeholder="Repita la contraseña">
                </div>

                <div class="botones">

                   <a href="login.html" class="btn-registrar">
                                                Registrar
                    </a>
                    
                    <button
                        type="reset"
                        class="btn-cancelar">

                        Cancelar

                    </button>

                </div>

            </form>

        </div>

    </div>

</body>
</html>
